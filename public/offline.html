<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolPulse - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4ff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(31, 65, 179, 0.12);
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #1F41B3;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      font-weight: bold;
      color: white;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #1e293b; }
    p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 28px;
      font-size: 14px;
      color: #dc2626;
    }
    .dot {
      width: 8px; height: 8px;
      background: #dc2626;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .features {
      text-align: left;
      background: #f8fafc;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 28px;
    }
    .features h3 { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #334155;
      padding: 4px 0;
    }
    .feature-icon { color: #1F41B3; font-size: 16px; }
    button {
      background: #1F41B3;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #1a36a0; }
    .sync-time { font-size: 12px; color: #94a3b8; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SP</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features may be limited, but you can still view your cached data.</p>

    <div class="status">
      <div class="dot"></div>
      No network connection
    </div>

    <div class="features">
      <h3>Available Offline</h3>
      <div class="feature-item"><span class="feature-icon">📅</span> View cached timetable</div>
      <div class="feature-item"><span class="feature-icon">📊</span> View cached grades</div>
      <div class="feature-item"><span class="feature-icon">📝</span> View cached assignments</div>
      <div class="feature-item"><span class="feature-icon">📢</span> Read cached announcements</div>
      <div class="feature-item"><span class="feature-icon">📚</span> Browse lesson materials</div>
    </div>

    <button onclick="window.location.reload()">Try Again</button>
    <div class="sync-time" id="syncTime"></div>
  </div>

  <script>
    const lastSync = localStorage.getItem('lastSyncTime');
    if (lastSync) {
      const syncDate = new Date(lastSync);
      document.getElementById('syncTime').textContent =
        'Last synced: ' + syncDate.toLocaleString();
    }
  </script>
</body>
</html>
